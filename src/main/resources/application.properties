spring.application.name=veilbid

# PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=admin
spring.datasource.password=veilbid
spring.datasource.url=jdbc:postgresql://localhost:5433/veilbidDB

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/veilbid-website

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Optional Redis timeout
spring.data.redis.timeout=60000